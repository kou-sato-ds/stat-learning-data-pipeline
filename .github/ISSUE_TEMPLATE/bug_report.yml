name: バグ報告
description: 動作の不具合を報告
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 概要
      description: 何が起きたか、簡潔に
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 再現手順
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待した挙動
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の挙動
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: 影響レイヤ
      options:
        - frontend (LIFF)
        - backend (Cloud Functions)
        - sql (BigQuery)
        - analysis (Python scripts)
        - infra/scripts
        - docs
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境情報
      placeholder: |
        - OS:
        - ブラウザ/LINE App version:
        - Python version (該当する場合):
        - GCP region:
