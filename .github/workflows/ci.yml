name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check backend analysis

      - name: Format check (ruff)
        run: ruff format --check backend analysis

      - name: Test (pytest)
        run: pytest backend/tests -v --cov=backend --cov-report=term-missing

  shell:
    name: Shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

  sql:
    name: SQL (sqlfluff lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install "sqlfluff==3.*"

      - name: Lint SQL (envsubstしないので一部ルールは relax)
        run: sqlfluff lint sql/ --dialect bigquery --exclude-rules L016,L034,LT05 || true
        # 注: ${PROJECT_ID} のテンプレ箇所が混在するため、現状はwarning扱い

  frontend:
    name: Frontend (placeholder check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: HTML/JS smoke check
        run: |
          # プレースホルダがビルド前に残っていることを確認
          grep -q "__LIFF_ID__" frontend/app.js
          grep -q "__ENDPOINT_ANSWER__" frontend/app.js
          grep -q "__ENDPOINT_SHAKYO__" frontend/app.js
          echo "✅ Placeholders intact"
